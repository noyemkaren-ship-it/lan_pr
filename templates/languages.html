<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World на языках - Hello World Polyglot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: white;
            border-radius: 20px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo h1 {
            font-size: 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #667eea;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-outline {
            border: 2px solid #667eea;
            color: #667eea;
            background: transparent;
        }
        
        .main-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }
        
        .languages-list {
            background: white;
            border-radius: 15px;
            padding: 20px;
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        
        .languages-list h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .lang-btn {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            background: #f5f5f5;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .lang-btn:hover {
            background: #667eea;
            color: white;
            transform: translateX(5px);
        }
        
        .lang-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .content-area {
            background: white;
            border-radius: 15px;
            padding: 25px;
        }
        
        .language-info {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .language-name {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .language-desc {
            color: #666;
            line-height: 1.6;
        }
        
        .features {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 15px 0;
        }
        
        .feature-tag {
            background: #f0f0f0;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #667eea;
        }
        
        .code-editor {
            margin: 20px 0;
        }
        
        .code-editor label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
        }
        
        textarea {
            width: 100%;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            background: #1e1e1e;
            color: #d4d4d4;
            resize: vertical;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .run-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        
        .run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .output {
            margin-top: 20px;
            background: #1e1e1e;
            border-radius: 10px;
            padding: 15px;
        }
        
        .output h4 {
            color: #d4d4d4;
            margin-bottom: 10px;
        }
        
        .output-content {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            color: #4ec9b0;
            white-space: pre-wrap;
        }
        
        .syntax-box {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
        }
        
        .syntax-box h4 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .syntax-code {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            overflow-x: auto;
        }
        
        @media (max-width: 768px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .languages-list {
                position: static;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>🌍 Hello World Polyglot</h1>
            </div>
            <nav>
                <div class="user-info">
                    <span>👤 {{ user }}</span>
                    <a href="/" class="btn btn-outline">🏠 Главная</a>
                    <a href="/logout" class="btn btn-outline">🚪 Выйти</a>
                </div>
            </nav>
        </header>
        
        <div class="main-grid">
            <div class="languages-list">
                <h3>📚 Языки программирования</h3>
                {% for key, lang in languages.items() %}
                    <button class="lang-btn" data-lang="{{ key }}" onclick="selectLanguage('{{ key }}')">
                        💻 {{ lang.name }}
                    </button>
                {% endfor %}
            </div>
            
            <div class="content-area">
                <div class="language-info">
                    <h2 class="language-name" id="lang-name">Выбери язык</h2>
                    <p class="language-desc" id="lang-desc"></p>
                    <div class="features" id="lang-features"></div>
                </div>
                
                <div class="code-editor">
                    <label>✏️ Редактор кода</label>
                    <textarea id="code-editor" rows="10" placeholder="Твой код появится здесь..."></textarea>
                    <button class="run-btn" onclick="runCode()">🚀 Запустить код</button>
                </div>
                
                <div class="output" id="output-area" style="display: none;">
                    <h4>📤 Вывод:</h4>
                    <div class="output-content" id="output-content"></div>
                </div>
                
                <div class="syntax-box">
                    <h4>📖 Синтаксис Hello World:</h4>
                    <div class="syntax-code" id="syntax-code"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const languages = {{ languages | tojson | safe }};
        let currentLang = null;
        
        function selectLanguage(langKey) {
            currentLang = langKey;
            const lang = languages[langKey];
            
            if (!lang) return;
            
            document.getElementById('lang-name').textContent = lang.name;
            document.getElementById('lang-desc').textContent = lang.description;
            
            const featuresDiv = document.getElementById('lang-features');
            if (lang.features && lang.features.length) {
                featuresDiv.innerHTML = lang.features.map(function(f) {
                    return '<span class="feature-tag">✨ ' + f + '</span>';
                }).join('');
            } else {
                featuresDiv.innerHTML = '';
            }
            
            document.getElementById('code-editor').value = lang.example || '';
            const syntaxCode = document.getElementById('syntax-code');
            if (syntaxCode) {
                syntaxCode.innerHTML = '<pre style="margin: 0; white-space: pre-wrap;">' + escapeHtml(lang.syntax || '') + '</pre>';
            }
            
            document.getElementById('output-area').style.display = 'none';
            
            const buttons = document.querySelectorAll('.lang-btn');
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            
            const activeBtn = document.querySelector('.lang-btn[data-lang="' + langKey + '"]');
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
        }
        
        async function runCode() {
            if (!currentLang) {
                alert('Сначала выбери язык программирования!');
                return;
            }
            
            const code = document.getElementById('code-editor').value;
            const outputDiv = document.getElementById('output-area');
            const outputContent = document.getElementById('output-content');
            
            outputContent.textContent = '🔄 Выполнение...';
            outputDiv.style.display = 'block';
            
            try {
                const response = await fetch('/run-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        language: currentLang,
                        code: code
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    let outputText = result.output || '(пустой вывод)';
                    if (result.error) {
                        outputText = outputText + '\n\n⚠️ Ошибки:\n' + result.error;
                    }
                    outputContent.textContent = outputText;
                } else {
                    outputContent.textContent = '❌ Ошибка: ' + (result.error || 'Неизвестная ошибка');
                }
            } catch (error) {
                outputContent.textContent = '❌ Ошибка соединения: ' + error.message;
            }
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        window.onload = function() {
            const firstLang = Object.keys(languages)[0];
            if (firstLang) {
                selectLanguage(firstLang);
            }
        };
    </script>
</body>
</html>
